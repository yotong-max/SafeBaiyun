name: Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
  HAS_SIGNING: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      if: env.HAS_SIGNING == 'true'
      env:
        SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
      run: |
        echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks
        echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" >> local.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
        echo "keystoreFile=release-keystore.jks" >> local.properties

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Get APK info
      id: apk_info
      run: |
        APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        APK_NAME=$(basename "$APK_PATH")
        echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-${{ github.run_number }}
        path: ${{ steps.apk_info.outputs.apk_path }}
        retention-days: 30

    - name: Upload mapping.txt (if exists)
      if: hashFiles('app/build/outputs/mapping/release/mapping.txt') != ''
      uses: actions/upload-artifact@v4
      with:
        name: mapping-${{ github.run_number }}
        path: app/build/outputs/mapping/release/mapping.txt
        retention-days: 30

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ steps.apk_info.outputs.apk_path }}
          app/build/outputs/mapping/release/mapping.txt
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build summary
      if: always()
      run: |
        echo "## Build Result" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ **Build Successful**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **APK**: \`${{ steps.apk_info.outputs.apk_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Download**: Check the **Artifacts** section in the Actions run" >> $GITHUB_STEP_SUMMARY
          if [ "${{ env.HAS_SIGNING }}" != "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Note**: This build uses debug signing. Configure \`SIGNING_KEYSTORE_BASE64\` secret for production signing." >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "❌ **Build Failed**" >> $GITHUB_STEP_SUMMARY
        fi
